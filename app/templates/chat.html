<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SharkNinja | Data Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"surface-container-low":"#121e1f","on-tertiary-fixed-variant":"#004f50",surface:"#091516","tertiary-container":"#002626","on-secondary-fixed":"#311400",background:"#091516","surface-container":"#162223","surface-container-lowest":"#051011","surface-container-highest":"#2b3738","surface-variant":"#2b3738","on-surface":"#d8e5e6","on-surface-variant":"#c7c5cf","surface-container-high":"#202c2d","surface-dim":"#091516","on-background":"#d8e5e6","surface-bright":"#2f3b3c",tertiary:"#09dcdd","on-tertiary":"#003737",primary:"#c1c3f0","on-primary":"#2a2d51",secondary:"#ffb786","on-secondary":"#502400",error:"#ffb4ab",outline:"#919099","outline-variant":"#46464e","secondary-container":"#803e00","on-secondary-container":"#ffb17c","primary-container":"#1b1e41","on-primary-container":"#8386af","error-container":"#93000a","on-error-container":"#ffdad6"},fontFamily:{headline:["Montserrat"],body:["Inter"],label:["Inter"],mono:["JetBrains Mono"]}}}};</script>
<style>
body{background:#091516;background-image:radial-gradient(circle at 2px 2px,rgba(0,218,243,0.05) 1px,transparent 0);background-size:32px 32px}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#091516}::-webkit-scrollbar-thumb{background:#2b3738;border-radius:10px}
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-dot{0%,100%{opacity:0.3}50%{opacity:1}}
.msg-anim{animation:fade-up 0.3s ease-out both}
.typing-dot{animation:pulse-dot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
</style>
</head>
<body class="font-body text-on-surface overflow-x-hidden h-screen flex flex-col">

<!-- Top Nav -->
<header class="w-full sticky top-0 z-50 border-b border-outline-variant/20 bg-surface-container-lowest flex items-center justify-between px-10 py-2 shrink-0">
  <div class="flex items-center gap-2">
    <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:'FILL' 1">precision_manufacturing</span>
    <h1 class="font-headline text-xl font-bold tracking-tighter text-primary">SHARK | NINJA</h1>
  </div>
  <nav class="flex gap-6">
    <a class="text-on-surface-variant text-sm hover:text-tertiary transition-colors" href="/">Dashboard</a>
    <a class="text-on-surface-variant text-sm hover:text-tertiary transition-colors" href="/demo">Live Demo</a>
    <a class="text-tertiary font-bold text-sm tracking-wider" href="/chat">Data Chat</a>
  </nav>
  <div class="flex items-center gap-3">
    <span class="text-xs text-outline font-label tracking-widest uppercase">AI Triage System</span>
  </div>
</header>

<main class="flex-1 flex flex-col max-w-3xl mx-auto w-full px-4 py-4 overflow-hidden">
  <!-- Chat Header -->
  <div class="flex items-center gap-3 mb-4 shrink-0">
    <div class="w-10 h-10 rounded-full bg-tertiary-container/50 border border-tertiary/30 flex items-center justify-center">
      <span class="material-symbols-outlined text-tertiary">smart_toy</span>
    </div>
    <div>
      <h2 class="font-headline text-lg font-bold text-primary">Data Analyst</h2>
      <p class="text-xs text-on-surface-variant">Ask me anything about the classified ticket data — powered by <span id="model-badge" class="text-tertiary">Llama</span></p>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto space-y-4 pb-4 pr-1">
    <!-- Welcome message -->
    <div class="flex gap-3 msg-anim">
      <div class="w-7 h-7 rounded-full bg-tertiary-container/50 border border-tertiary/30 flex items-center justify-center shrink-0 mt-0.5">
        <span class="material-symbols-outlined text-tertiary text-sm">smart_toy</span>
      </div>
      <div class="bg-surface-container-low border border-outline-variant/20 rounded-lg rounded-tl-none p-3 max-w-[85%]">
        <p class="text-sm text-on-surface leading-relaxed">Hey! I can answer questions about your SharkNinja ticket data. Try asking things like:</p>
        <div class="mt-2 space-y-1">
          <button onclick="askSuggestion(this)" class="block w-full text-left text-xs text-tertiary hover:text-on-surface bg-surface-container hover:bg-surface-variant/40 border border-outline-variant/10 rounded px-3 py-1.5 transition-colors">"What category has the most tickets?"</button>
          <button onclick="askSuggestion(this)" class="block w-full text-left text-xs text-tertiary hover:text-on-surface bg-surface-container hover:bg-surface-variant/40 border border-outline-variant/10 rounded px-3 py-1.5 transition-colors">"Why is the escalation rate so high?"</button>
          <button onclick="askSuggestion(this)" class="block w-full text-left text-xs text-tertiary hover:text-on-surface bg-surface-container hover:bg-surface-variant/40 border border-outline-variant/10 rounded px-3 py-1.5 transition-colors">"Which products have the most reviews?"</button>
          <button onclick="askSuggestion(this)" class="block w-full text-left text-xs text-tertiary hover:text-on-surface bg-surface-container hover:bg-surface-variant/40 border border-outline-variant/10 rounded px-3 py-1.5 transition-colors">"What ML models are used in this system?"</button>
          <button onclick="askSuggestion(this)" class="block w-full text-left text-xs text-tertiary hover:text-on-surface bg-surface-container hover:bg-surface-variant/40 border border-outline-variant/10 rounded px-3 py-1.5 transition-colors">"How could we reduce the escalation rate?"</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="shrink-0 border-t border-outline-variant/20 pt-3">
    <form id="chat-form" onsubmit="sendMessage(event)" class="flex gap-2">
      <input id="chat-input" type="text" autocomplete="off"
        class="flex-1 bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-2.5 text-sm text-on-surface placeholder-outline focus:outline-none focus:border-tertiary/50 focus:ring-1 focus:ring-tertiary/30"
        placeholder="Ask about the data..."/>
      <button type="submit" id="send-btn"
        class="bg-tertiary/20 border border-tertiary/40 text-tertiary px-4 py-2.5 rounded-lg text-sm hover:bg-tertiary/30 transition-all flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-sm">send</span>
      </button>
    </form>
  </div>
</main>

<script>
const messages = document.getElementById("messages");
const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const modelBadge = document.getElementById("model-badge");

function scrollBottom() {
  messages.scrollTop = messages.scrollHeight;
}

function addUserMsg(text) {
  const div = document.createElement("div");
  div.className = "flex gap-3 justify-end msg-anim";
  div.innerHTML = `
    <div class="bg-tertiary/10 border border-tertiary/20 rounded-lg rounded-tr-none p-3 max-w-[85%]">
      <p class="text-sm text-on-surface leading-relaxed">${escHtml(text)}</p>
    </div>
    <div class="w-7 h-7 rounded-full bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0 mt-0.5">
      <span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
    </div>`;
  messages.appendChild(div);
  scrollBottom();
}

function addBotMsg(text, model) {
  if (model) modelBadge.textContent = model;
  const div = document.createElement("div");
  div.className = "flex gap-3 msg-anim";
  div.innerHTML = `
    <div class="w-7 h-7 rounded-full bg-tertiary-container/50 border border-tertiary/30 flex items-center justify-center shrink-0 mt-0.5">
      <span class="material-symbols-outlined text-tertiary text-sm">smart_toy</span>
    </div>
    <div class="bg-surface-container-low border border-outline-variant/20 rounded-lg rounded-tl-none p-3 max-w-[85%]">
      <p class="text-sm text-on-surface leading-relaxed whitespace-pre-wrap">${escHtml(text)}</p>
      ${model ? `<p class="text-[10px] text-outline mt-2 flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">memory</span>${escHtml(model)}</p>` : ""}
    </div>`;
  messages.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const div = document.createElement("div");
  div.id = "typing-indicator";
  div.className = "flex gap-3 msg-anim";
  div.innerHTML = `
    <div class="w-7 h-7 rounded-full bg-tertiary-container/50 border border-tertiary/30 flex items-center justify-center shrink-0 mt-0.5">
      <span class="material-symbols-outlined text-tertiary text-sm">smart_toy</span>
    </div>
    <div class="bg-surface-container-low border border-outline-variant/20 rounded-lg rounded-tl-none px-4 py-3">
      <div class="flex gap-1.5">
        <div class="w-2 h-2 rounded-full bg-tertiary typing-dot"></div>
        <div class="w-2 h-2 rounded-full bg-tertiary typing-dot"></div>
        <div class="w-2 h-2 rounded-full bg-tertiary typing-dot"></div>
      </div>
    </div>`;
  messages.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function askSuggestion(btn) {
  const text = btn.textContent.replace(/^"|"$/g, "");
  chatInput.value = text;
  sendMessage(new Event("submit"));
}

async function sendMessage(e) {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;

  chatInput.value = "";
  sendBtn.disabled = true;
  addUserMsg(text);
  showTyping();

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({question: text}),
    });
    const data = await resp.json();
    hideTyping();

    if (data.error) {
      addBotMsg("Error: " + data.error);
    } else {
      addBotMsg(data.answer, data.model);
    }
  } catch (err) {
    hideTyping();
    addBotMsg("Connection error: " + err.message);
  }

  sendBtn.disabled = false;
  chatInput.focus();
}
</script>
</body>
</html>
